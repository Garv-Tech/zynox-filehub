<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zynox</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 5L11 2L19 5V11C19 15.4 15.4 19.3 11 20.5C6.6 19.3 3 15.4 3 11V5Z" fill="#7c5cfc" opacity="0.2" stroke="#7c5cfc" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M8 11L10 13L14 9" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Zynox</span>
      </div>
    </div>
    <div class="sidebar-section-label">Storage</div>
    <nav id="sidebar-tree"></nav>
    <div id="sidebar-footer">
      <div id="storage-bar-wrap"><div id="storage-bar-fill"></div></div>
      <div id="storage-label"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">

    <header id="topbar">
      <div id="breadcrumb-pill">
        <button id="back-btn" onclick="goRoot()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 11L5 7L9 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="breadcrumb-parts"></div>
      </div>

      <div id="topbar-right">
        <div id="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/>
            <path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input id="search" placeholder="Search files..." autocomplete="off">
        </div>
        <select id="sort-select" onchange="applySort()">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="size-desc">Largest</option>
          <option value="size-asc">Smallest</option>
          <option value="date-desc">Newest</option>
          <option value="date-asc">Oldest</option>
        </select>
        <button class="action-btn" onclick="newFolder()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 3C1 2.4 1.4 2 2 2H5.6L7 3.5H12C12.6 3.5 13 3.9 13 4.5V11C13 11.6 12.6 12 12 12H2C1.4 12 1 11.6 1 11V3Z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7 6V9M5.5 7.5H8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          New folder
        </button>
        <button class="action-btn accent-btn" onclick="upload()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 9V2M4 5L7 2L10 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 10V11C2 11.6 2.4 12 3 12H11C11.6 12 12 11.6 12 11V10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Upload
        </button>
      </div>
    </header>

    <div id="files-area">
      <div id="files"></div>
      <div id="empty-state" style="display:none">
        <p>This folder is empty</p>
        <span>Drop files here or click Upload</span>
      </div>
      <div id="drop-overlay">
        <div id="drop-inner">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <path d="M20 26V10M13 17L20 10L27 17" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 30V32C8 33.1 8.9 34 10 34H30C31.1 34 32 33.1 32 32V30" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p>Drop to upload</p>
        </div>
      </div>
    </div>

  </main>

</div>

<!-- PREVIEW OVERLAY — IDs match what app.js uses -->
<div id="preview-overlay" onclick="closePreview()">
  <div id="preview-box" onclick="event.stopPropagation()">
    <button id="preview-close" onclick="closePreview()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="preview-name"></div>
    <div id="preview-content"></div>
  </div>
</div>


<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <button onclick="ctxOpen()">Open</button>
  <button onclick="ctxDownload()">Download</button>
  <button onclick="ctxRename()">Rename</button>
  <div class="ctx-sep"></div>
  <button class="ctx-danger" onclick="ctxDelete()">Delete</button>
</div>
<div id="toast-container"></div>
<input type="file" id="fileInput" multiple hidden>
<script src="/static/app.js"></script>
</body>
</html>
